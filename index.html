<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />

  <!-- Security -->
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net https://fonts.googleapis.com; font-src 'self' https://cdn.jsdelivr.net https://fonts.gstatic.com; img-src 'self' data: blob:; connect-src 'self'; frame-ancestors 'none';" />
  <meta http-equiv="X-Content-Type-Options" content="nosniff" />
  <meta http-equiv="X-Frame-Options" content="DENY" />
  <meta http-equiv="Referrer-Policy" content="strict-origin-when-cross-origin" />

  <!-- PWA / iOS -->
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="SVchat" />
  <link rel="apple-touch-icon" href="/icons/icon-152.png" />
  <link rel="apple-touch-icon" sizes="152x152" href="/icons/icon-152.png" />
  <link rel="apple-touch-icon" sizes="180x180" href="/icons/icon-192.png" />

  <!-- Android / PWA -->
  <meta name="theme-color" content="#0057FF" />
  <meta name="mobile-web-app-capable" content="yes" />
  <link rel="manifest" href="/manifest.json" />
  <link rel="icon" type="image/png" sizes="192x192" href="/icons/icon-192.png" />
  <link rel="icon" type="image/png" sizes="512x512" href="/icons/icon-512.png" />

  <!-- App info -->
  <meta name="application-name" content="SVchat" />
  <meta name="description" content="–Ч–∞—Й–Є—Й—С–љ–љ—Л–є –Љ–µ—Б—Б–µ–љ–і–ґ–µ—А —Б E2E —И–Є—Д—А–Њ–≤–∞–љ–Є–µ–Љ –Є –≤–Є–і–µ–Њ–Ј–≤–Њ–љ–Ї–∞–Љ–Є" />

  <title>SVchat</title>

  <!-- Fonts & Icons -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/dist/tabler-icons.min.css" />

  <!-- Capacitor safe area -->
  <style>
    :root {
      --sat: env(safe-area-inset-top, 0px);
      --sab: env(safe-area-inset-bottom, 0px);
      --sal: env(safe-area-inset-left, 0px);
      --sar: env(safe-area-inset-right, 0px);
    }
    /* –Ъ—А–Њ—Б—Б–±—А–∞—Г–Ј–µ—А–љ–∞—П —Д–Є–Ї—Б–∞—Ж–Є—П: —Б—В—А–∞–љ–Є—Ж–∞ –љ–µ —Б–Ї—А–Њ–ї–ї–Є—В—Б—П, –љ–µ —Г–µ–Ј–ґ–∞–µ—В –њ–Њ–і —З—С–ї–Ї—Г/—Б—В–∞—В—Г—Б-–±–∞—А.
       –°–Ї—А–Њ–ї–ї—П—В—Б—П —В–Њ–ї—М–Ї–Њ –≤–љ—Г—В—А–µ–љ–љ–Є–µ –Њ–±–ї–∞—Б—В–Є (–ї–µ–љ—В–∞ —Б–Њ–Њ–±—Й–µ–љ–Є–є). */
    html, body {
      margin: 0; padding: 0;
      position: fixed; inset: 0;
      width: 100%; height: 100%;
      overflow: hidden;
      overscroll-behavior: none;
      -webkit-text-size-adjust: 100%;
      background: #0a0e1a;
    }
    #root { position: fixed; inset: 0; overflow: hidden; }
    #splash {
      position: fixed; inset: 0; background: #0a0e1a;
      display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 16px;
      z-index: 9999; transition: opacity 0.4s;
    }
    #splash svg { animation: pulse 1.5s ease-in-out infinite; }
    @keyframes pulse { 0%,100%{transform:scale(1)} 50%{transform:scale(1.06)} }
