name: E2E Tests

on:
  push:
    branches: [main]
  workflow_dispatch: {}   # ручной запуск из вкладки Actions
  schedule:
    - cron: '0 6 * * *'   # ежедневно ~09:00 МСК

jobs:
  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Install & run E2E
        working-directory: svchat-e2e
        env:
          SVCHAT_URL: https://svchat-server.onrender.com
          CI: 'true'
        run: |
          npm ci || npm install
          npx playwright install --with-deps chromium
          npm test
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: svchat-e2e/playwright-report/
          retention-days: 7
