name: E2E Tests

on:
  push:
    branches: [main]
  workflow_dispatch: {}   # ручной запуск из вкладки Actions
  schedule:
    - cron: '0 6 * * *'   # ежедневно ~09:00 МСК

jobs:
  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Install
        working-directory: svchat-e2e
        run: |
          npm ci || npm install
          npx playwright install --with-deps chromium
      # Разогрев: будим Render (free-tier засыпает) — иначе тесты падают по таймауту на холодном старте.
      - name: Warm up server
        run: |
          for i in $(seq 1 40); do
            code=$(curl -s -o /dev/null -w "%{http_code}" --max-time 25 https://svchat-server.onrender.com/health || echo 000)
            echo "ping $i: $code"
            if [ "$code" = "200" ]; then echo "сервер проснулся"; exit 0; fi
            sleep 5
          done
          echo "разогрев не дождался 200 — продолжаем, тесты сами подождут"
      # Гейт: стабильные smoke-тесты (без WebSocket). Их падение валит сборку.
      - name: Smoke tests (gate)
        working-directory: svchat-e2e
        env:
          SVCHAT_URL: https://svchat-server.onrender.com
          CI: 'true'
        run: npm run test:smoke
      # Realtime-тесты (WebSocket): информативные, не блокируют (флакают против живого сервера).
      - name: Realtime tests (informational)
        if: always()
        continue-on-error: true
        working-directory: svchat-e2e
        env:
          SVCHAT_URL: https://svchat-server.onrender.com
          CI: 'true'
        run: npm run test:realtime
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: svchat-e2e/playwright-report/
          retention-days: 7
